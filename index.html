<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח שנה עברי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <!-- IIFE bundle — sets window.hebcal synchronously before deferred module scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@hebcal/core@6/dist/bundle.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="nav-bar">
      <button class="nav-btn nav-btn-year" id="btn-prev-year" aria-label="שנה קודמת">&#171; שנה קודמת</button>
      <button class="nav-btn" id="btn-prev" aria-label="חודש קודם">&#8249; חודש קודם</button>
      <h1 id="current-title"></h1>
      <button class="nav-btn" id="btn-next" aria-label="חודש הבא">חודש הבא &#8250;</button>
      <button class="nav-btn nav-btn-year" id="btn-next-year" aria-label="שנה הבאה">שנה הבאה &#187;</button>
    </div>
  </header>

  <div id="app-wrapper">

    <!-- ── Sidebar (right in RTL) ── -->
    <aside id="sidebar">
      <div id="year-type-sidebar" class="sidebar-card year-type-card"></div>
      <div class="sidebar-card">
        <button class="sidebar-title" id="sidebar-toggle" aria-expanded="false">
          קפיצה לתאריך
          <span class="sidebar-arrow">&#9660;</span>
        </button>

        <div id="sidebar-body" hidden>
          <div class="jump-tabs">
            <button class="jump-tab active" id="tab-heb">עברי</button>
            <button class="jump-tab" id="tab-greg">לועזי</button>
          </div>

          <!-- Hebrew date form -->
          <div id="form-heb" class="jump-form">
            <div class="jump-row">
              <label class="jump-label" for="jh-year">שנה</label>
              <input type="number" id="jh-year" class="jump-input" min="5600" max="6000">
            </div>
            <div class="jump-row">
              <label class="jump-label" for="jh-month">חודש</label>
              <select id="jh-month" class="jump-select"></select>
            </div>
            <div class="jump-row">
              <label class="jump-label" for="jh-day">יום</label>
              <input type="number" id="jh-day" class="jump-input" min="1" max="30" value="1">
            </div>
            <button id="btn-go-heb" class="jump-go">עבור</button>
            <div id="jh-error" class="jump-error"></div>
          </div>

          <!-- Gregorian date form -->
          <div id="form-greg" class="jump-form" hidden>
            <input type="date" id="jg-date" class="jump-date-input">
            <button id="btn-go-greg" class="jump-go">עבור</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Calendar (left in RTL) ── -->
    <main id="app"></main>

    <!-- ── Year type (mobile only — below detail panel) ── -->
    <div id="year-type-mobile" class="year-type-card"></div>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
